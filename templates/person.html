<!DOCTYPE html>
<html lang="${locale}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Standard Meta Tags -->
    <title>${native_name}</title>
    <meta name="description" content="${meta_desc}">
    <meta name="keywords" content="${keywords_txt}">

    <!-- Social Media (Open Graph) -->
    <meta property="og:title" content="${native_name}">
    <meta property="og:description" content="${meta_desc}">
    <meta property="og:type" content="article">
    <meta property="og:url" content="yourdomain.com{slug_url}.html">
    
    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="${native_name}">
    <meta name="twitter:description" content="${meta_desc}">

    <!-- External Assets -->
    <link rel="stylesheet" href="../css/style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <script src="../js/lang-switcher.js" defer></script>
</head>
<body>
    <nav class="lang-nav">
        <!-- Changing the hash triggers the JS lang switcher instantly -->
        <select class="lang-select" onchange="location.hash = this.value">
            <option value="en">English</option>
            <option value="ar">العربية</option>
        </select>
    </nav>

    <main class="memorial-container">
        <article class="memorial-card">
            <header class="memorial-header">
                <!-- Original name in its own script -->
                <h1 class="native-name" dir="${direction}">${native_name}</h1>
                
                <!-- Translation placeholder filled by JS -->
                <h2 id="name-translation" class="translation-subtitle" data-auto-dir data-translations='${translation_json}'></h2>
            </header>

            <section class="memorial-content">
                <div class="life-dates">
                    <p>
                        <span data-translations='{"en": "Born", "ar": "ولد"}'>Born</span>: 
                        <time>${birth_date}</time>
                    </p>
                    <p>
                        <span data-translations='{"en": "Martyred", "ar": "استشهد"}'>Martyred</span>: 
                        <time>${death_date}</time>
                    </p>
                </div>
                
                <div class="tags-container">
                    ${tags_html}
                </div>
            </section>

            <footer class="memorial-footer">
                <hr>
                <a href="../index.html" data-translations='{"en": "← Back to Index", "ar": "← العودة إلى الفهرس"}'>← Back to Index</a>
                <p class="id-badge">ID: ${person_id}</p>
            </footer>
        </article>
    </main>
</body>
</html>
