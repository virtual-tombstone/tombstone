<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorial Index</title>
    <link rel="stylesheet" href="css/style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="index-container">
        <header class="index-header">
            <h1>Digital Memorial Index</h1>
            <p class="counter">Total Profiles Documented: <strong>${total_records}</strong></p>
            
            <!-- Live client-side text filter input box -->
            <input type="text" id="search-bar" placeholder="Type a name to filter profiles instantly..." autocomplete="off">
        </header>

        <!-- Injected list items generated by your build loop -->
        <ul id="index-list" class="index-grid">
            ${index_items_html}
        </ul>
    </main>

    <script>
        // High-performance live filtering logic
        document.getElementById('search-bar').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            const items = document.querySelectorAll('.index-item');
            
            items.forEach(item => {
                const text = item.textContent.toLowerCase();
                if (text.includes(query)) {
                    item.style.display = '';
                } else {
                    item.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
